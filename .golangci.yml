# golangci-lint v2 configuration for goclawkit.
# Run locally with: golangci-lint run ./...
version: "2"

linters:
  # The curated default set (errcheck, govet, ineffassign, staticcheck, unused)
  # plus bodyclose. These catch real defects: unchecked errors, unclosed response
  # bodies, suspicious constructs. Stylistic linters (revive, misspell) are left
  # off on purpose to avoid churn on deliberate naming/spelling. The codebase is
  # expected to pass cleanly; CI fails on any finding.
  default: standard
  enable:
    - bodyclose      # HTTP response bodies must be closed (an HTTP-calling plugin may make real requests)

formatters:
  enable:
    - gofmt
