# plugin.yml: the at-rest, pre-launch description the goclaw host reads BEFORE
# launching this plugin. The runtime `hello` handshake stays the source of truth for
# the live channel; this file is what the host knows before the process starts.
#
# This is a CHANNEL: the bot DIALS OUT to an IRC server over TLS (no inbound listener,
# no open port), joins a channel, forwards messages that mention it or are sent to it
# directly up to the agent, and posts replies back. A channel is not a slash command,
# so `command:` is omitted. `env` lists variable NAMES only; the host supplies VALUES
# at launch (never put a secret value here).
name: irc                    # stable id; must match Info.Name from the handshake
kind: channel                # this is a channel, not a tool
version: "1.0.0"             # the plugin's own version
author: shindakun            # plugin author (free-form); shown in plugin listings
url: https://github.com/shindakun/goclawkit  # plugin source/home
exec: irc                    # built binary, relative to this plugin dir
description: Minimal IRC bridge; dials out, joins a channel, relays mentions and DMs.
env:                         # env var NAMES the plugin needs; host supplies VALUES
  - IRC_SERVER               # host:port (default irc.libera.chat:6697, TLS)
  - IRC_NICK                 # the bot's nick (default goclawbot)
  - IRC_CHANNEL              # channel to join (default #goclawtester)
  - IRC_OWNER_NICK           # optional, informational; the host access gate authorizes
