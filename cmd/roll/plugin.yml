# plugin.yml: the at-rest, pre-launch description the goclaw host reads BEFORE
# launching this plugin. The runtime `hello` handshake stays the source of truth for
# the live tool list; this file is what the host knows before the process starts.
#
# name/kind/version MUST agree with what the plugin reports in its handshake Info
# (see cmd/roll/main.go: Info.Name "roll", Kind tool, version "1.0.0"). `env` lists
# variable NAMES only; the host supplies VALUES from its own config at launch, so a
# secret VALUE must never appear here. Enable/disable is host-owned state kept out of
# this file.
name: roll                 # stable id; must match Info.Name from the handshake
kind: tool                 # "tool" now ("channel" later)
version: "1.0.0"           # the plugin's own version
author: shindakun          # plugin author (free-form); shown in plugin listings
url: https://github.com/shindakun/goclawkit  # plugin source/home (git or web)
exec: roll                 # built binary, relative to this plugin dir
description: Roll dice in NdM notation (e.g. 2d6).
command: roll              # registers the /roll slash command; omit for no command
env: []                    # env var NAMES the plugin needs; host supplies VALUES
